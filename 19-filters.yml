- name: demo on filters
  hosts: local
  connection: local
  vars: 
    topics: linux, shell, ansible, terraform
  tags:
    name: ansible
    project: roboshop
    component: catalogue
  tasks: 
  - name: greetings
    ansible.builtin.debug:
      msg: "Hi Sri, {{ GREETING | default('Good Morning') }}"

  - name: greetings
    ansible.builtin.debug:
      msg: "{{ topics | split(',') }}"
  
  - name: map to list
    ansible.builtin.debug:
      msg: "{{ tags | dict2items }}"